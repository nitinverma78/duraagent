<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Style Editor</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #1e1e1e; color: #cccccc; 
        }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .titlebar { 
            height: 30px; background-color: #323233; display: flex; align-items: center; 
            padding: 0 10px; font-size: 12px; border-bottom: 1px solid #252526; 
            justify-content: center;
        }
        .main { display: flex; flex: 1; overflow: hidden; }
        .activity-bar { 
            width: 48px; background-color: #333333; display: flex; flex-direction: column; 
            align-items: center; padding-top: 10px; border-right: 1px solid #252526; 
        }
        .sidebar { 
            width: 250px; background-color: #252526; border-right: 1px solid #1e1e1e; 
            display: flex; flex-direction: column; 
        }
        .sidebar-header { 
            padding: 10px 20px; font-size: 11px; text-transform: uppercase; 
            font-weight: 600; color: #bbbbbb; 
        }
        .editor-container { flex: 1; display: flex; flex-direction: column; }
        .tabs { height: 35px; background-color: #252526; display: flex; }
        .tab { 
            background-color: #1e1e1e; padding: 0 15px; display: flex; align-items: center; 
            color: #ffffff; font-size: 13px; border-right: 1px solid #252526; 
            border-top: 1px solid #007acc; cursor: pointer; gap: 5px;
        }
        .editor-area { flex: 1; position: relative; }
        #monaco-editor { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .statusbar { 
            height: 22px; background-color: #007acc; color: white; display: flex; 
            align-items: center; padding: 0 10px; font-size: 12px; 
        }
        
        .file-explorer { display: flex; flex-direction: column; padding: 0; }
        .file-item { 
            padding: 4px 10px 4px 20px; font-size: 13px; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; 
        }
        .file-item:hover { background-color: #2a2d2e; }
        .file-item.active { background-color: #37373d; color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="titlebar">
            <span>VS Code Style Editor</span>
        </div>
        <div class="main">
            <div class="activity-bar">
                <!-- Placeholder icons -->
                <div style="width: 24px; height: 2px; background-color: #858585; margin: 10px 0 3px 0;"></div>
                <div style="width: 24px; height: 2px; background-color: #858585; margin: 3px 0;"></div>
                <div style="width: 24px; height: 2px; background-color: #858585; margin: 3px 0 15px 0;"></div>
            </div>
            <div class="sidebar">
                <div class="sidebar-header">Explorer</div>
                <div class="file-explorer">
                    <div class="file-item active">📄 index.js</div>
                    <div class="file-item">📄 styles.css</div>
                    <div class="file-item">📄 package.json</div>
                </div>
            </div>
            <div class="editor-container">
                <div class="tabs">
                    <div class="tab">📄 index.js</div>
                </div>
                <div class="editor-area">
                    <div id="monaco-editor"></div>
                </div>
            </div>
        </div>
        <div class="statusbar">
            <span>main*</span>
            <span style="flex: 1;"></span>
            <span>Ln 1, Col 1</span>
            <span style="margin-left: 15px;">UTF-8</span>
            <span style="margin-left: 15px;">JavaScript</span>
        </div>
    </div>

    <!-- Load Monaco Editor via CDN (The engine powering VS Code) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            var editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: [
                    'function createAwesomeApp() {',
                    '\tconsole.log("Hello, from your VS Code style editor!");',
                    '\t',
                    '\t// Powered by Monaco Editor',
                    '\t// You get syntax highlighting, autocompletion, and more out of the box!',
                    '}',
                    '',
                    'createAwesomeApp();'
                ].join('\n'),
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                fontFamily: 'Consolas, "Courier New", monospace'
            });
        });
    </script>
</body>
</html>
